<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ORL Media — Under Maintenance</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html, body {
    height: 100%;
  }

  body {
    font-family: 'Cormorant Garamond', serif;
    background-color: #FAF6EE;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    overflow: hidden;
    position: relative;
  }

  .container {
    padding: 2rem;
    z-index: 2;
  }

  .brand {
    font-size: clamp(3.5rem, 10vw, 7rem);
    font-weight: 600;
    letter-spacing: 0.04em;
    color: #2b2620;
    line-height: 1;
    margin-bottom: 1.5rem;
  }

  .divider {
    width: 80px;
    height: 1px;
    background-color: #b8a888;
    margin: 0 auto 1.5rem auto;
  }

  .message {
    font-size: clamp(1.3rem, 3vw, 1.9rem);
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #6b6153;
  }

  .submessage {
    margin-top: 0.6rem;
    font-size: clamp(1rem, 2vw, 1.3rem);
    font-weight: 400;
    font-style: italic;
    color: #948a78;
  }

  .bg-texture {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(circle at 20% 20%, rgba(184, 168, 136, 0.08), transparent 40%),
      radial-gradient(circle at 80% 80%, rgba(184, 168, 136, 0.08), transparent 40%);
    z-index: 1;
  }
</style>
</head>
<body>

  <div class="bg-texture"></div>

  <div class="container">
    <div class="brand">ORL Media</div>
    <div class="divider"></div>
    <div class="message">Under Construction</div>
    <div class="submessage">We will be back soon</div>
  </div>

</body>
</html>
